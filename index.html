<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizu Fractal Engine - Illustrator Edition</title>
    <style>
        /**
         * =============================================================================
         * MIZU FRACTAL ENGINE - Estándar de Navegación Fractal para la Web e IA
         * Copyright (C) 2026 Moises Núñez / Mizu Legends Studios
         * Licencia: AGPLv3 | Edición: Illustrator Pastel
         * =============================================================================
         */

        :root {
            /* Paleta Pastel Seco / Ilustración Premium */
            --hex-gold: #d4b483;     /* Tiza Dorado */
            --hex-blue: #a8dadc;     /* Azul Hielo Seco */
            --bg-dark: #2b2d42;      /* Carbón Suave */
            --bg-card: #edf2f4;      /* Papel Crema */
            --text-main: #2b2d42;    /* Tinta Oscura */
            --glass: rgba(255, 255, 255, 0.7);
            --transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: "Inter", "Beaufort for LOL", sans-serif; 
            overflow: hidden; 
            perspective: 2000px;
            height: 100vh;
        }

        /* --- HUD NAVBAR --- */
        .hud-nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            mask-image: linear-gradient(to right, black 85%, transparent 100%);
        }
        .hud-nav::-webkit-scrollbar { display: none; }

        .crumb {
            white-space: nowrap; font-size: 11px; letter-spacing: 2px;
            color: var(--hex-gold); padding: 8px 15px;
            background: var(--glass); border: 1px solid var(--hex-gold);
            backdrop-filter: blur(10px); cursor: pointer;
            text-transform: uppercase; border-radius: 4px;
        }

        /* --- STAGE & NODES --- */
        #stage {
            width: 100vw; height: 100vh;
            display: flex; transform-style: preserve-3d;
        }

        @media (orientation: portrait) {
            #stage { flex-direction: column; }
            .node { flex: 1; width: 100%; height: 33.33vh; }
            .node-detail { display: none; }
        }

        @media (orientation: landscape) {
            #stage { 
                flex-direction: column; 
                overflow-y: auto; 
                scroll-snap-type: y mandatory;
            }
            .node { 
                flex: 0 0 100vh; 
                scroll-snap-align: start; 
                padding: 100px;
            }
            .node-detail { display: block; margin-top: 30px; opacity: 0.8; font-size: 1.1rem; max-width: 700px; line-height: 1.6; }
        }

        .node {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; background: var(--bg-card);
            border-bottom: 2px solid rgba(0,0,0,0.05);
            transition: all var(--transition);
            cursor: pointer;
            text-align: center;
        }

        .node:focus {
            background: #fff;
            border: 2px solid var(--hex-gold);
            box-shadow: 0 0 30px rgba(212, 180, 131, 0.2);
            z-index: 10;
        }

        .node-tag { 
            font-size: 0.8rem; color: var(--hex-gold); 
            text-transform: uppercase; letter-spacing: 4px; margin-bottom: 15px;
        }

        .node h2 { font-size: 3rem; text-transform: uppercase; letter-spacing: 8px; color: var(--bg-dark); }

        /* --- ANIMATIONS --- */
        .zoom-forward { transform: translateZ(1200px); opacity: 0; filter: blur(15px); }
        .spawn-in { animation: spawn var(--transition) forwards; }
        @keyframes spawn {
            0% { transform: scale(0.9) translateZ(-500px); opacity: 0; }
            100% { transform: scale(1) translateZ(0); opacity: 1; }
        }
    </style>
</head>
<body>

<nav class="hud-nav" id="hud-nav"></nav>
<div id="stage"></div>

<script>
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        tic(freq = 800) {
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.04);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.05);
        }
    };

    let fractalData = {};
    let historyStack = ['HOME'];

    // Cargar datos desde JSON externo
    async function loadData() {
        try {
            const response = await fetch('data.json');
            fractalData = await response.json();
            loadFromURL();
        } catch (e) {
            console.error("Error cargando data.json. Usando datos de respaldo.");
            fractalData = {"HOME": {"items": ["Error: JSON no encontrado"], "desc": "Revisa tu data.json"}};
            render('HOME');
        }
    }

    function updateURL() {
        window.location.hash = historyStack.join('/');
    }

    function loadFromURL() {
        const hash = window.location.hash.replace('#/', '').replace('#', '');
        if (hash) {
            historyStack = hash.split('/');
            render(historyStack[historyStack.length - 1], 'forward');
        } else {
            render('HOME');
        }
    }

    function render(node, direction = 'forward') {
        const stage = document.getElementById('stage');
        const oldNodes = document.querySelectorAll('.node');
        
        oldNodes.forEach(n => n.classList.add('zoom-forward'));

        setTimeout(() => {
            stage.innerHTML = '';
            const key = node.toUpperCase();
            const data = fractalData[key] || { items: [], desc: 'Perfil detallado y terminal.' };
            
            // Calle sin salida: Nivel 5 o datos vacíos
            const isTerminal = historyStack.length > 4 || data.items.length === 0;

            if (isTerminal) {
                stage.innerHTML = `
                <div class="node spawn-in" tabIndex="0">
                    <div class="node-tag">Perfil Terminal</div>
                    <h2>${node}</h2>
                    <div class="node-detail">${data.desc}</div>
                </div>`;
            } else {
                data.items.forEach((name, i) => {
                    const div = document.createElement('div');
                    div.className = `node spawn-in`;
                    div.tabIndex = 0;
                    div.innerHTML = `
                        <div class="node-tag">${key}</div>
                        <h2>${name}</h2>
                        <div class="node-detail">${fractalData[name.toUpperCase()]?.desc || 'Haz clic o pulsa Enter para profundizar.'}</div>
                    `;
                    
                    div.onclick = () => {
                        AudioEngine.tic(1100);
                        historyStack.push(name);
                        updateURL();
                        render(name, 'forward');
                    };

                    div.onkeydown = (e) => {
                        if (e.key === 'Enter') { e.preventDefault(); div.click(); }
                        if (e.key === 'ArrowDown') { e.preventDefault(); div.nextElementSibling?.focus(); }
                        if (e.key === 'ArrowUp') { e.preventDefault(); div.previousElementSibling?.focus(); }
                    };
                    stage.appendChild(div);
                });
            }
            updateHUD();
            const first = stage.querySelector('.node');
            if(first) first.focus();
        }, 300);
    }

    function updateHUD() {
        const nav = document.getElementById('hud-nav');
        nav.innerHTML = '';
        historyStack.forEach((name, i) => {
            const span = document.createElement('span');
            span.className = 'crumb';
            span.innerText = name;
            span.onclick = () => {
                if (i === historyStack.length - 1) return;
                AudioEngine.tic(700);
                historyStack = historyStack.slice(0, i + 1);
                updateURL();
                render(name, 'backward');
            };
            nav.appendChild(span);
        });

        // Botón Donación Profesional
        const donateBtn = document.createElement('a');
        donateBtn.className = 'crumb';
        donateBtn.href = "https://www.paypal.com/donate/?hosted_button_id=CE4XEUSEYHQXL";
        donateBtn.target = "_blank";
        donateBtn.style.cssText = "border-color: #ff5f5f; color: #ff5f5f; font-weight: bold; margin-left: auto;";
        donateBtn.innerText = "☕ APOYAR";
        nav.appendChild(donateBtn);

        nav.scrollLeft = nav.scrollWidth;
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' || e.key === 'Backspace') {
            if (historyStack.length > 1) {
                AudioEngine.tic(600);
                historyStack.pop();
                updateURL();
                render(historyStack[historyStack.length - 1], 'backward');
            }
        }
    });

    window.addEventListener('hashchange', loadFromURL);
    loadData();
</script>
</body>
</html>
